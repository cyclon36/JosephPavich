<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joseph Pavich Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Menu overlay -->
  <div class="menu-overlay" id="menuOverlay"></div>
  
  <div class="hamburger-float" id="hamburger-float">
    <button id="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false">
      <span class="hamburger-icon">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>
  
  <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-links">
      <a href="#background" class="navbar-link" tabindex="0">BACKGROUND</a>
      <a href="#challenges" class="navbar-link" tabindex="0">CHALLENGES</a>
      <a href="#values" class="navbar-link" tabindex="0">VALUES</a>
      <a href="#goals" class="navbar-link" tabindex="0">GOALS</a>
    </div>
    <span class="navbar-title">JOSEPH PAVICH</span>
    <div class="hamburger-bar" style="display:none"></div>
  </nav>
  
  <div class="dropdown" id="dropdownMenu" role="menu" aria-label="Navigation menu">
    <a href="#background" class="dropdown-link" role="menuitem" tabindex="-1">BACKGROUND</a>
    <a href="#challenges" class="dropdown-link" role="menuitem" tabindex="-1">CHALLENGES</a>
    <a href="#values" class="dropdown-link" role="menuitem" tabindex="-1">VALUES</a>
    <a href="#goals" class="dropdown-link" role="menuitem" tabindex="-1">GOALS</a>
  </div>
  
  <div class="hero-bg" role="banner"></div>
  
  <main class="content" role="main">
    <h1>Welcome to Joseph Pavich's Portfolio</h1>
    <p>This is sample content. Your hero background and navigation bar now match your custom requirements!</p>
  </main>
  
  <section class="retro-bar" role="region" aria-label="Portfolio gallery">
    <div class="stripe-bg"></div>
    <div class="image-row">
      <img src="Frame1.png" alt="Portfolio frame 1" tabindex="0"/>
      <img src="Frame2.png" alt="Portfolio frame 2" tabindex="0"/>
      <img src="Frame3.png" alt="Portfolio frame 3" tabindex="0"/>
      <img src="Frame4.png" alt="Portfolio frame 4" tabindex="0"/>
      <img src="Frame5.png" alt="Portfolio frame 5" tabindex="0"/>
      <img src="Frame6.png" alt="Portfolio frame 6" tabindex="0"/>
    </div>
  </section>
  
  <script>
    // Enhanced hamburger dropdown functionality
    const hamburgerFloat = document.getElementById('hamburger-float');
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const menuOverlay = document.getElementById('menuOverlay');
    const dropdownLinks = document.querySelectorAll('.dropdown-link');
    
    let isMenuOpen = false;
    
    function openMenu() {
      isMenuOpen = true;
      dropdownMenu.classList.add('open');
      menuOverlay.classList.add('active');
      hamburgerFloat.classList.add('active');
      hamburgerBtn.setAttribute('aria-expanded', 'true');
      hamburgerBtn.setAttribute('aria-label', 'Close navigation menu');
      
      // Enable tab navigation for dropdown links
      dropdownLinks.forEach(link => link.setAttribute('tabindex', '0'));
      
      // Focus first dropdown link
      if (dropdownLinks.length > 0) {
        dropdownLinks[0].focus();
      }
    }
    
    function closeMenu() {
      isMenuOpen = false;
      dropdownMenu.classList.remove('open');
      menuOverlay.classList.remove('active');
      hamburgerFloat.classList.remove('active');
      hamburgerBtn.setAttribute('aria-expanded', 'false');
      hamburgerBtn.setAttribute('aria-label', 'Open navigation menu');
      
      // Disable tab navigation for dropdown links
      dropdownLinks.forEach(link => link.setAttribute('tabindex', '-1'));
    }
    
    hamburgerBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (isMenuOpen) {
        closeMenu();
      } else {
        openMenu();
      }
    });
    
    // Close menu when clicking overlay
    menuOverlay.addEventListener('click', closeMenu);
    
    // Close menu when clicking outside
    document.body.addEventListener('click', function(e) {
      if (!dropdownMenu.contains(e.target) && !hamburgerFloat.contains(e.target)) {
        closeMenu();
      }
    });
    
    // Prevent dropdown clicks from closing menu
    dropdownMenu.addEventListener('click', function(e) {
      e.stopPropagation();
    });
    
    // Close menu when selecting a dropdown link
    dropdownLinks.forEach(link => {
      link.addEventListener('click', closeMenu);
    });
    
    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && isMenuOpen) {
        closeMenu();
        hamburgerBtn.focus();
      }
      
      if (isMenuOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
        e.preventDefault();
        const currentIndex = Array.from(dropdownLinks).indexOf(document.activeElement);
        let nextIndex;
        
        if (e.key === 'ArrowDown') {
          nextIndex = currentIndex + 1;
          if (nextIndex >= dropdownLinks.length) nextIndex = 0;
        } else {
          nextIndex = currentIndex - 1;
          if (nextIndex < 0) nextIndex = dropdownLinks.length - 1;
        }
        
        dropdownLinks[nextIndex].focus();
      }
    });
    
    // Enhanced navbar scroll behavior
    let prevScroll = window.scrollY;
    const navbar = document.getElementById('navbar');
    
    window.addEventListener('scroll', function() {
      const currScroll = window.scrollY;
      
      // Add scrolled class for background opacity
      if (currScroll > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
      
      // Hide/show navbar based on scroll direction
      if (currScroll > prevScroll && currScroll > 60) {
        // Scrolling down
        navbar.classList.add('hide');
      } else {
        // Scrolling up
        navbar.classList.remove('hide');
      }
      
      prevScroll = currScroll;
    });
    
    // Parallax effect for hero background
    window.addEventListener('scroll', function() {
      const scrolled = window.scrollY;
      const heroSection = document.querySelector('.hero-bg');
      const rate = scrolled * -0.5;
      
      if (window.innerWidth > 900) { // Only on desktop for performance
        heroSection.style.transform = `translateY(${rate}px)`;
      }
    });
    
    // Enhanced image interactions
    const images = document.querySelectorAll('.image-row img');
    images.forEach(img => {
      img.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          // Add click simulation for keyboard users
          img.click();
        }
      });
    });
  </script>
</body>
</html>
