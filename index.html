<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joseph Pavich's Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #fafaf8;
      color: #333;
    }
    
    /* Navigation Bar */
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #fafaf8;
      padding: 16px 24px;
      border-radius: 0 0 32px 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .nav-logo {
      height: 40px;
      width: auto;
    }
    
    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    
    .nav-links a {
      text-decoration: none;
      color: #333;
      font-weight: 500;
      transition: color 0.2s;
    }
    
    .nav-links a:hover {
      color: #007bff;
    }
    
    .nav-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    
    .nav-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 32px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    
    .nav-btn.demo {
      background: #007bff;
      color: white;
    }
    
    .nav-btn.demo:hover {
      background: #0056b3;
    }
    
    .nav-btn.signin {
      background: transparent;
      color: #333;
      border: 1px solid #333;
    }
    
    .nav-btn.signin:hover {
      background: #333;
      color: white;
    }
    
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      background: #f0f0f0;
      transition: background 0.2s;
    }
    
    .menu-toggle:hover {
      background: #e0e0e0;
    }
    
    /* Hero Section */
    .hero {
      background-image: url('PINT.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      width: 100vw;
      min-height: 400px;
      height: min(48vw, 600px);
      margin-top: 80px; /* Account for fixed nav */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Content Section */
    .content {
      padding: 4rem 2rem 2rem;
      background: #fafaf8;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    /* Image Gallery */
    .image-gallery {
      padding: 2rem;
      background: #fafaf8;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .image-gallery img {
      height: 120px;
      width: auto;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .image-gallery img:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
      .nav-links, .nav-actions {
        display: none;
      }
      
      .menu-toggle {
        display: block;
      }
      
      .nav-bar {
        padding: 12px 16px;
      }
      
      .hero {
        margin-top: 60px;
        min-height: 300px;
        height: 60vw;
      }
      
      .content {
        padding: 2rem 1rem;
      }
      
      .image-gallery {
        padding: 1rem;
        gap: 16px;
      }
      
      .image-gallery img {
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="nav-bar">
    <ul class="nav-links">
      <li><a href="#r1s">R1S</a></li>
      <li><a href="#r1t">R1T</a></li>
      <li><a href="#r2">R2</a></li>
      <li><a href="#r3">R3</a></li>
      <li><a href="#fleet">Fleet</a></li>
    </ul>
    
    <img src="Name.png" alt="Joseph Pavich" class="nav-logo">
    
    <div class="nav-actions">
      <a href="#demo" class="nav-btn demo">Demo Drive</a>
      <a href="#signin" class="nav-btn signin">Sign In</a>
    </div>
    
    <button class="menu-toggle" aria-label="Menu">
      <span>☰</span>
    </button>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <!-- Hero content can be added here if needed -->
  </section>

  <!-- Content Section -->
  <div class="content">
    <h1>Welcome to Joseph Pavich's Portfolio</h1>
    <p>This is sample content. Scroll down to see the retro image bar at the center!</p>
  </div>
  
  <!-- Image Gallery -->
  <div class="image-gallery">
    <img src="Frame1.png" alt="Frame 1"/>
    <img src="Frame2.png" alt="Frame 2"/>
    <img src="Frame3.png" alt="Frame 3"/>
    <img src="Frame4.png" alt="Frame 4"/>
    <img src="Frame5.png" alt="Frame 5"/>
    <img src="Frame6.png" alt="Frame 6"/>
  </div>
</body>
</html>
